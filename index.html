<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE FIRE VIP PANEL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        
        /* พื้นหลัง ฟ้า สไตล์สายฟ้าฟีฟาย */
        body {
            background: radial-gradient(circle, #1a0005 0%, #000c14 100%), linear-gradient(135deg, #ff1f44 0%, #00d2ff 100%);
            background-blend-mode: overlay;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* กล่องพาเนลหลัก ตั้งอยู่ตรงกลางจอ */
        .panel-box {
            background: rgba(10, 10, 18, 0.95);
            border: 2px solid #00d2ff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3), inset 0 0 15px rgba(255, 31, 68, 0.2);
            border-radius: 20px;
            width: 360px;
            padding: 30px 25px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
        }

        h2 { 
            font-size: 26px; 
            margin-bottom: 25px; 
            text-shadow: 0 0 10px #ff1f44, 0 0 20px #ff1f44;
            letter-spacing: 2px;
        }
        
        .hidden { display: none !important; }

        /* หน้า Login */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 6px; color: #00d2ff; letter-spacing: 1px; }
        .input-group input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #00d2ff;
            background: rgba(0, 0, 0, 0.5); color: white; font-size: 16px;
            transition: 0.3s;
        }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px #ff1f44; border-color: #ff1f44; }
        
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(90deg, #ff1f44, #00d2ff);
            border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.2s; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .btn:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(0, 210, 255, 0.5); }

        /* หน้าเมนู */
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(26, 26, 46, 0.8); padding: 14px; margin-bottom: 12px;
            border-radius: 10px; border-left: 5px solid #00d2ff;
            transition: all 0.3s;
        }
        /* เวลาเปิดเมนูให้เปลี่ยนเป็นขอบฟ้าเรืองแสง */
        .menu-item.active { 
            border-left-color: #ff1f44; 
            background: rgba(255, 31, 68, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 31, 68, 0.2);
        }

        /* สวิตช์ เปิด-ปิด Custom ใหม่ให้เนียนตาขึ้น */
        .switch { position: relative; display: inline-block; width: 48px; height: 25px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 25px;
        }
        .slider:before {
            position: absolute; content: ""; height: 17px; width: 17px;
            left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff1f44; box-shadow: 0 0 10px #ff1f44; }
        input:checked + .slider:before { transform: translateX(23px); }
        
        .status { font-size: 12px; margin-top: 20px; color: #888; font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel-box" id="panel">
        
        <div id="login-section">
            <h2>KING PANEL LOGIN 👑</h2>
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้ที่นี่...">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="ใส่รหัสผ่านที่นี่...">
            </div>
            <button class="btn" onclick="checkLogin()">LOGIN</button>
        </div>

        <div id="menu-section" class="hidden">
            <h2>👑 KING MENU V2</h2>
            
            <div class="menu-item">
                <span>ช่วยเล็งหัว 75% 💀</span>
                <label class="switch"><input type="checkbox" onchange="toggleHack(this, 'ช่วยเล็งหัว 75%')"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>ช่วยลดการกระตุก 📲</span>
                <label class="switch"><input type="checkbox" onchange="toggleHack(this, 'ช่วยลดการกระตุก')"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>หมุนจอไว 🖥️</span>
                <label class="switch"><input type="checkbox" onchange="toggleHack(this, 'หมุนจอไว')"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>กันดำ 🛡️</span>
                <label class="switch"><input type="checkbox" onchange="toggleHack(this, 'กันดำ')"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>กันแบน 🔒</span>
                <label class="switch"><input type="checkbox" onchange="toggleHack(this, 'กันแบน')"><span class="slider"></span></label>
            </div>

            <button class="btn" style="background: #222; border: 1px solid #444;" onclick="logout()">LOGOUT</button>
            <div class="status" id="log-status">STATUS: พร้อมใช้งาน</div>
        </div>
    </div>

    <script>
        // ระบบเสียงบี๊บสังเคราะห์แบบพกพา ไม่ต้องพึ่งไฟล์นอก
        function playSound(type) {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                
                osc.connect(gain);
                gain.connect(context.destination);
                
                if(type === 'on') {
                    // เสียงติ๊ดสูงสะใจตอนเปิดใช้งาน
                    osc.frequency.setValueAtTime(650, context.currentTime); 
                    gain.gain.setValueAtTime(0.1, context.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.08);
                    osc.stop(context.currentTime + 0.08);
                } else {
                    // เสียงตุ๊บต่ำตอนปิดใช้งาน
                    osc.frequency.setValueAtTime(280, context.currentTime); 
                    gain.gain.setValueAtTime(0.1, context.currentTime);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
                    osc.stop(context.currentTime + 0.1);
                }
            } catch (e) {
                console.log("เบราว์เซอร์บล็อกเสียงชั่วคราว ต้องมีการกดที่หน้าจอก่อน");
            }
        }

        // เช็คระบบ Login (ตามเงื่อนไขเป๊ะๆ)
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "King" && pass === "GAMME123") {
                alert("ยินดีต้อนรับเข้าสู่ระบบ! 🚀");
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('menu-section').classList.remove('hidden');
                playSound('on');
            } else {
                alert("ไอ้สัส รหัสผิด! ลองใหม่ดิ๊ ❌");
            }
        }

        // ฟังก์ชัน เปิด-ปิด เมนู (เปลี่ยนสี + บันทึกสถานะจริง + มีเสียง)
        function toggleHack(checkbox, name) {
            const logStatus = document.getElementById('log-status');
            const item = checkbox.closest('.menu-item');
            
            if(checkbox.checked) {
                item.classList.add('active');
                logStatus.innerText = `STATUS: เปิดใช้งาน ${name} ✅`;
                logStatus.style.color = "#ff1f44";
                playSound('on');
            } else {
                item.classList.remove('active');
                logStatus.innerText = `STATUS: ปิดใช้งาน ${name} ❌`;
                logStatus.style.color = "#00d2ff";
                playSound('off');
            }
        }

        // ฟังก์ชัน Logout
        function logout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('menu-section').classList.add('hidden');
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('log-status').innerText = "STATUS: พร้อมใช้งาน";
            document.getElementById('log-status').style.color = "#888";
            playSound('off');
        }
    </script>
</body>
  </html>
